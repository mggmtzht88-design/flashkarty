<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ruština">
<title>Flash Karty Ruština</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3a;
    --accent: #c0392b;
    --accent2: #e74c3c;
    --gold: #f39c12;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --correct: #27ae60;
    --wrong: #c0392b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .screen { display: none; flex-direction: column; height: 100vh; height: -webkit-fill-available; }
  .screen.active { display: flex; }

  /* MENU */
  #menu { background: var(--bg); padding: 60px 24px 40px; justify-content: space-between; }
  .logo { text-align: center; }
  .logo-ru {
    font-size: 32px; font-weight: 700;
    color: var(--accent2); letter-spacing: 4px; line-height: 1.2;
    text-shadow: 0 0 40px rgba(231,76,60,0.4);
    text-align: center;
  }
  .logo-ru2 {
    font-size: 20px;
    color: var(--accent2);
    letter-spacing: 6px;
    margin-top: 4px;
    text-shadow: 0 0 20px rgba(231,76,60,0.3);
    text-align: center;
  }
  .logo-sub { font-size: 11px; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; margin-top: 8px; }
  .menu-stats {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px 20px;
    display: flex; justify-content: space-around;
  }
  .stat-item { text-align: center; }
  .stat-num { font-family: 'Unbounded', sans-serif; font-size: 22px; color: var(--gold); }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }
  .menu-sections { display: flex; flex-direction: column; gap: 10px; }
  .section-title { font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; padding-left: 4px; }
  .menu-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 20px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 14px;
    text-align: left; display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: all 0.15s; width: 100%;
  }
  .menu-btn:active { background: var(--card); transform: scale(0.98); }
  .menu-btn.primary { border-color: rgba(192,57,43,0.4); }
  .menu-btn .icon { font-size: 20px; width: 28px; text-align: center; }
  .menu-btn .label { flex: 1; }
  .menu-btn .arrow { color: var(--muted); font-size: 12px; }

  /* SETTINGS */
  #settings { padding: 60px 24px 40px; gap: 24px; }
  .screen-header { display: flex; align-items: center; gap: 16px; }
  .back-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; width: 40px; height: 40px;
    color: var(--text); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .screen-title { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 400; }
  .setting-group { display: flex; flex-direction: column; gap: 8px; }
  .setting-label { font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; padding-left: 4px; }
  .options-grid { display: grid; gap: 8px; }
  .options-grid.cols2 { grid-template-columns: 1fr 1fr; }
  .options-grid.cols4 { grid-template-columns: repeat(4, 1fr); }
  .option-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 8px;
    color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 13px;
    text-align: center; cursor: pointer; transition: all 0.15s;
  }
  .option-btn.selected { background: var(--accent); border-color: var(--accent); color: white; }
  .option-btn:active { transform: scale(0.97); }
  .start-btn {
    background: var(--accent); border: none; border-radius: 16px;
    padding: 18px; color: white;
    font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s; margin-top: auto;
  }
  .start-btn:active { transform: scale(0.98); opacity: 0.9; }

  /* GAME */
  #game { position: relative; }
  .game-header {
    padding: 50px 20px 12px;
    display: flex; align-items: center; gap: 12px;
    background: var(--bg);
  }
  .progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent2); border-radius: 2px; transition: width 0.3s ease; }
  .progress-text { font-size: 11px; color: var(--muted); min-width: 40px; text-align: right; }
  .card-area { flex: 1; display: flex; flex-direction: column; padding: 16px 20px; gap: 12px; }
  .category-badge {
    display: inline-block; font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; align-self: flex-start;
  }
  .main-card {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: 24px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px; gap: 16px; position: relative; overflow: hidden;
  }
  .main-card::before {
    content: ''; position: absolute; top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(192,57,43,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .card-direction { font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }
  .card-question { font-family: 'Unbounded', sans-serif; font-size: 36px; font-weight: 700; text-align: center; line-height: 1.2; }
  .card-phonetic { font-size: 14px; color: var(--gold); letter-spacing: 1px; font-style: italic; }
  .card-answer {
    display: none; flex-direction: column; align-items: center; gap: 8px;
    padding-top: 16px; border-top: 1px solid var(--border); width: 100%; text-align: center;
  }
  .card-answer.visible { display: flex; }
  .answer-label { font-size: 9px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }
  .answer-text { font-family: 'Unbounded', sans-serif; font-size: 22px; color: var(--accent2); }
  .input-area { display: flex; gap: 10px; align-items: center; }
  .answer-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 18px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 16px;
    outline: none; transition: border-color 0.2s;
  }
  .answer-input:focus { border-color: var(--accent); }
  .answer-input.correct { border-color: var(--correct); background: rgba(39,174,96,0.08); }
  .answer-input.wrong { border-color: var(--wrong); background: rgba(192,57,43,0.08); }
  .submit-btn {
    background: var(--accent); border: none; border-radius: 14px;
    width: 52px; height: 52px; color: white; font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .submit-btn:active { transform: scale(0.95); }
  .feedback-row {
    display: none; align-items: center; gap: 10px;
    padding: 12px 16px; border-radius: 12px; font-size: 13px;
  }
  .feedback-row.correct { display: flex; background: rgba(39,174,96,0.12); color: var(--correct); }
  .feedback-row.wrong { display: flex; background: rgba(192,57,43,0.12); color: var(--accent2); }
  .next-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    cursor: pointer; display: none; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.15s;
  }
  .next-btn.visible { display: flex; }
  .next-btn:active { background: var(--card); }

  /* RESULT */
  #result { padding: 60px 24px 40px; justify-content: space-between; align-items: center; }
  .result-header { text-align: center; }
  .result-emoji { font-size: 64px; margin-bottom: 16px; }
  .result-title { font-family: 'Unbounded', sans-serif; font-size: 24px; margin-bottom: 8px; }
  .result-sub { color: var(--muted); font-size: 12px; }
  .result-score { text-align: center; }
  .score-big {
    font-family: 'Unbounded', sans-serif; font-size: 80px; font-weight: 700;
    color: var(--accent2); line-height: 1;
    text-shadow: 0 0 60px rgba(231,76,60,0.3);
  }
  .score-label { color: var(--muted); font-size: 11px; letter-spacing: 3px; margin-top: 8px; }
  .result-details {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
    display: flex; justify-content: space-around; width: 100%;
  }
  .detail-item { text-align: center; }
  .detail-num { font-family: 'Unbounded', sans-serif; font-size: 20px; }
  .detail-num.green { color: var(--correct); }
  .detail-num.red { color: var(--wrong); }
  .detail-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; }
  .result-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .action-btn {
    border-radius: 14px; padding: 16px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    cursor: pointer; text-align: center; transition: all 0.15s; border: 1px solid var(--border);
  }
  .action-btn.primary {
    background: var(--accent); border-color: var(--accent); color: white;
    font-family: 'Unbounded', sans-serif; font-size: 12px; letter-spacing: 2px;
  }
  .action-btn.secondary { background: var(--surface); color: var(--text); }
  .action-btn:active { transform: scale(0.98); }

  /* STATS */
  #stats { padding: 60px 24px 40px; gap: 20px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 16px; text-align: center; }
  .stat-card .num { font-family: 'Unbounded', sans-serif; font-size: 28px; color: var(--accent2); }
  .stat-card .lbl { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 6px; }
  .reset-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 12px;
    padding: 14px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    cursor: pointer; margin-top: auto;
  }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <div class="logo">
    <div class="logo-ru">ФЛЭШ КАРТЫ</div>
    <div class="logo-ru2">РУССКИЙ ЯЗЫК</div>
  </div>
  <div class="menu-stats">
    <div class="stat-item">
      <div class="stat-num" id="stat-games">0</div>
      <div class="stat-label">Her</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="stat-best">0%</div>
      <div class="stat-label">Nejlepší</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="stat-total">0%</div>
      <div class="stat-label">Celkově</div>
    </div>
  </div>
  <div class="menu-sections">
    <div class="section-title">Cvičení</div>
    <button class="menu-btn primary" onclick="goSettings('azbuka')">
      <span class="icon">🔤</span><span class="label">Azbuka</span><span class="arrow">›</span>
    </button>
    <button class="menu-btn primary" onclick="goSettings('slovicka')">
      <span class="icon">📖</span><span class="label">Slovíčka</span><span class="arrow">›</span>
    </button>
    <button class="menu-btn primary" onclick="goSettings('oboji')">
      <span class="icon">⚡</span><span class="label">Vše dohromady</span><span class="arrow">›</span>
    </button>
    <div class="section-title" style="margin-top:8px">Přehled</div>
    <button class="menu-btn" onclick="showScreen('stats')">
      <span class="icon">📊</span><span class="label">Statistiky</span><span class="arrow">›</span>
    </button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('menu')">‹</button>
    <div class="screen-title" id="settings-title">Nastavení</div>
  </div>
  <div class="setting-group" id="category-group">
    <div class="setting-label">Kategorie</div>
    <div class="options-grid cols2" id="category-options"></div>
  </div>
  <div class="setting-group">
    <div class="setting-label">Počet karet</div>
    <div class="options-grid cols4">
      <button class="option-btn" onclick="selectCount(5,this)">5</button>
      <button class="option-btn" onclick="selectCount(10,this)">10</button>
      <button class="option-btn selected" onclick="selectCount(20,this)">20</button>
      <button class="option-btn" onclick="selectCount(9999,this)">Vše</button>
    </div>
  </div>
  <div class="setting-group">
    <div class="setting-label">Směr</div>
    <div class="options-grid cols2">
      <button class="option-btn selected" id="dir-ru" onclick="selectDir('ru-cz')">🇷🇺 → 🇨🇿</button>
      <button class="option-btn" id="dir-cz" onclick="selectDir('cz-ru')">🇨🇿 → 🇷🇺</button>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">ZAČÍT →</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="showScreen('menu')">‹</button>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text">0/0</div>
  </div>
  <div class="card-area">
    <div class="category-badge" id="card-category">azbuka</div>
    <div class="main-card">
      <div class="card-direction" id="card-direction">RUSKY → ČESKY</div>
      <div class="card-question" id="card-question">А</div>
      <div class="card-phonetic" id="card-phonetic"></div>
      <div class="card-answer" id="card-answer">
        <div class="answer-label">Správně</div>
        <div class="answer-text" id="answer-text"></div>
      </div>
    </div>
    <div class="feedback-row" id="feedback"></div>
    <div class="input-area">
      <input type="text" class="answer-input" id="answer-input" placeholder="Tvoje odpověď..." autocomplete="off" autocorrect="off" autocapitalize="off">
      <button class="submit-btn" onclick="checkAnswer()">→</button>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextCard()">Další karta →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-header">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">Hotovo!</div>
    <div class="result-sub" id="result-sub"></div>
  </div>
  <div class="result-score">
    <div class="score-big" id="score-pct">0%</div>
    <div class="score-label">ÚSPĚŠNOST</div>
  </div>
  <div class="result-details">
    <div class="detail-item">
      <div class="detail-num green" id="res-correct">0</div>
      <div class="detail-label">Správně</div>
    </div>
    <div class="detail-item">
      <div class="detail-num red" id="res-wrong">0</div>
      <div class="detail-label">Špatně</div>
    </div>
    <div class="detail-item">
      <div class="detail-num" id="res-total">0</div>
      <div class="detail-label">Celkem</div>
    </div>
  </div>
  <div class="result-actions">
    <button class="action-btn primary" id="repeat-btn" onclick="repeatWrong()">OPAKOVAT CHYBY</button>
    <button class="action-btn secondary" onclick="startGame()">Hrát znovu</button>
    <button class="action-btn secondary" onclick="showScreen('menu')">Menu</button>
  </div>
</div>

<!-- STATS -->
<div id="stats" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('menu')">‹</button>
    <div class="screen-title">Statistiky</div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="num" id="s-games">0</div><div class="lbl">Počet her</div></div>
    <div class="stat-card"><div class="num" id="s-best">0%</div><div class="lbl">Nejlepší skóre</div></div>
    <div class="stat-card"><div class="num" id="s-total-q">0</div><div class="lbl">Otázek celkem</div></div>
    <div class="stat-card"><div class="num" id="s-avg">0%</div><div class="lbl">Průměr</div></div>
  </div>
  <button class="reset-btn" onclick="resetStats()">Smazat statistiky</button>
</div>

<script>
const AZBUKA = [
  {ru:"А а",lat:"A a"},{ru:"Б б",lat:"B b"},{ru:"В в",lat:"V v"},
  {ru:"Г г",lat:"G g"},{ru:"Д д",lat:"D d"},{ru:"Е е",lat:"Je je"},
  {ru:"Ж ж",lat:"Zh zh"},{ru:"З з",lat:"Z z"},{ru:"И и",lat:"I i"},
  {ru:"К к",lat:"K k"},{ru:"Л л",lat:"L l"},{ru:"М м",lat:"M m"},
  {ru:"Н н",lat:"N n"},{ru:"О о",lat:"O o"},{ru:"П п",lat:"P p"},
  {ru:"Р р",lat:"R r"},{ru:"С с",lat:"S s"},{ru:"Т т",lat:"T t"},
  {ru:"У у",lat:"U u"},{ru:"Ф ф",lat:"F f"},{ru:"Х х",lat:"Ch ch"},
  {ru:"Ц ц",lat:"Ts ts"},{ru:"Ч ч",lat:"Ch ch"},{ru:"Ш ш",lat:"Sh sh"},
  {ru:"Щ щ",lat:"Shch shch"},{ru:"Ъ ъ",lat:"tvrdý znak"},{ru:"Ы ы",lat:"Y y"},
  {ru:"Ь ь",lat:"mekký znak"},{ru:"Э э",lat:"E e"},{ru:"Ю ю",lat:"Yu yu"},
  {ru:"Я я",lat:"Ya ya"},
];

const SLOVICKA = [
  {ru:"привет",ph:"privet",cz:"ahoj",cat:"základní"},
  {ru:"пока",ph:"poka",cz:"nashledanou",cat:"základní"},
  {ru:"спасибо",ph:"spasibo",cz:"děkuji",cat:"základní"},
  {ru:"пожалуйста",ph:"pozhalujsta",cz:"prosím",cat:"základní"},
  {ru:"да",ph:"da",cz:"ano",cat:"základní"},
  {ru:"нет",ph:"njet",cz:"ne",cat:"základní"},
  {ru:"человек",ph:"chelovek",cz:"člověk",cat:"základní"},
  {ru:"день",ph:"djen",cz:"den",cat:"základní"},
  {ru:"война",ph:"vojna",cz:"válka",cat:"vojenství"},
  {ru:"мир",ph:"mir",cz:"mír / svět",cat:"vojenství"},
  {ru:"армия",ph:"armija",cz:"armáda",cat:"vojenství"},
  {ru:"солдат",ph:"soldat",cz:"voják",cat:"vojenství"},
  {ru:"оружие",ph:"oruzhije",cz:"zbraně",cat:"vojenství"},
  {ru:"удар",ph:"udar",cz:"útok / úder",cat:"vojenství"},
  {ru:"взрыв",ph:"vzryv",cz:"výbuch",cat:"vojenství"},
  {ru:"погибший",ph:"pogibshij",cz:"padlý / mrtvý",cat:"vojenství"},
  {ru:"раненый",ph:"ranenij",cz:"zraněný",cat:"vojenství"},
  {ru:"плен",ph:"plen",cz:"zajetí",cat:"vojenství"},
  {ru:"фронт",ph:"front",cz:"fronta",cat:"vojenství"},
  {ru:"наступление",ph:"nastupljenije",cz:"ofenziva",cat:"vojenství"},
  {ru:"потери",ph:"poteri",cz:"ztráty",cat:"vojenství"},
  {ru:"танк",ph:"tank",cz:"tank",cat:"technika"},
  {ru:"ракета",ph:"raketa",cz:"raketa",cat:"technika"},
  {ru:"дрон",ph:"dron",cz:"dron",cat:"technika"},
  {ru:"самолёт",ph:"samoljot",cz:"letadlo",cat:"technika"},
  {ru:"вертолёт",ph:"vertoljot",cz:"vrtulník",cat:"technika"},
  {ru:"корабль",ph:"korabl",cz:"loď",cat:"technika"},
  {ru:"артиллерия",ph:"artillerija",cz:"artilerie",cat:"technika"},
  {ru:"Украина",ph:"Ukraina",cz:"Ukrajina",cat:"geografie"},
  {ru:"Россия",ph:"Rossija",cz:"Rusko",cat:"geografie"},
  {ru:"граница",ph:"granica",cz:"hranice",cat:"geografie"},
  {ru:"территория",ph:"territorija",cz:"území",cat:"geografie"},
  {ru:"оккупация",ph:"okkupacija",cz:"okupace",cat:"geografie"},
  {ru:"Киев",ph:"Kijef",cz:"Kyjev",cat:"geografie"},
  {ru:"Москва",ph:"Moskva",cz:"Moskva",cat:"geografie"},
  {ru:"батальон",ph:"bataljon",cz:"batalion",cat:"jednotky"},
  {ru:"бригада",ph:"brigada",cz:"brigáda",cat:"jednotky"},
  {ru:"командир",ph:"komandir",cz:"velitel",cat:"jednotky"},
  {ru:"генерал",ph:"general",cz:"generál",cat:"jednotky"},
  {ru:"союзник",ph:"sojuznik",cz:"spojenec",cat:"jednotky"},
  {ru:"враг",ph:"vrag",cz:"nepřítel",cat:"jednotky"},
  {ru:"источник",ph:"istochnik",cz:"zdroj",cat:"osint"},
  {ru:"доказательство",ph:"dokazatelstvo",cz:"důkaz",cat:"osint"},
  {ru:"видео",ph:"video",cz:"video",cat:"osint"},
  {ru:"сообщение",ph:"soobshhenije",cz:"zpráva",cat:"osint"},
  {ru:"телеграм",ph:"telegram",cz:"Telegram",cat:"osint"},
  {ru:"канал",ph:"kanal",cz:"kanál",cat:"osint"},
  {ru:"переговоры",ph:"peregovory",cz:"jednání",cat:"politika"},
  {ru:"санкции",ph:"sankcii",cz:"sankce",cat:"politika"},
  {ru:"суверенитет",ph:"suverenitet",cz:"suverenita",cat:"politika"},
  {ru:"пропаганда",ph:"propaganda",cz:"propaganda",cat:"politika"},
  {ru:"правда",ph:"pravda",cz:"pravda",cat:"politika"},
  {ru:"ложь",ph:"lozh",cz:"lež",cat:"politika"},
  {ru:"НАТО",ph:"NATO",cz:"NATO",cat:"politika"},
];

const CATS = ["základní","vojenství","technika","geografie","jednotky","osint","politika"];

let mode='azbuka', selCats=[...CATS], selCount=20, selDir='ru-cz';
let deck=[], idx=0, correct=0, wrongCards=[], answered=false, isRepeat=false;

function loadStats(){ return JSON.parse(localStorage.getItem('ru_stats')||'{"games":0,"totalQ":0,"totalC":0,"best":0}'); }
function saveStats(c,t){
  const s=loadStats(); s.games++; s.totalQ+=t; s.totalC+=c;
  const p=Math.round(c/t*100); if(p>s.best) s.best=p;
  localStorage.setItem('ru_stats',JSON.stringify(s)); updateMenuStats();
}
function resetStats(){ if(confirm('Smazat všechny statistiky?')){ localStorage.removeItem('ru_stats'); updateMenuStats(); showStatsScreen(); } }
function updateMenuStats(){
  const s=loadStats();
  document.getElementById('stat-games').textContent=s.games;
  document.getElementById('stat-best').textContent=s.best+'%';
  const avg=s.totalQ>0?Math.round(s.totalC/s.totalQ*100):0;
  document.getElementById('stat-total').textContent=avg+'%';
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='stats') showStatsScreen();
  if(id==='menu') updateMenuStats();
}

function goSettings(m){
  mode=m; isRepeat=false;
  const titles={azbuka:'Azbuka',slovicka:'Slovíčka',oboji:'Vše dohromady'};
  document.getElementById('settings-title').textContent=titles[m];
  const cg=document.getElementById('category-group');
  const co=document.getElementById('category-options');
  if(m==='azbuka'){
    cg.style.display='none'; selCats=['azbuka'];
  } else {
    cg.style.display='flex'; selCats=[...CATS]; co.innerHTML='';
    CATS.forEach(cat=>{
      const b=document.createElement('button');
      b.className='option-btn selected'; b.textContent=cat;
      b.onclick=()=>toggleCat(cat,b); co.appendChild(b);
    });
  }
  document.querySelectorAll('.options-grid.cols4 .option-btn').forEach((b,i)=>b.classList.toggle('selected',i===2));
  selCount=20; selectDir('ru-cz'); showScreen('settings');
}

function toggleCat(cat,btn){
  if(selCats.includes(cat)){ if(selCats.length===1) return; selCats=selCats.filter(c=>c!==cat); btn.classList.remove('selected'); }
  else { selCats.push(cat); btn.classList.add('selected'); }
}

function selectCount(n,btn){
  selCount=n;
  document.querySelectorAll('.options-grid.cols4 .option-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

function selectDir(dir){
  selDir=dir;
  document.getElementById('dir-ru').classList.toggle('selected',dir==='ru-cz');
  document.getElementById('dir-cz').classList.toggle('selected',dir==='cz-ru');
}

function buildDeck(){
  let cards=[];
  if(mode==='azbuka'||mode==='oboji'){
    AZBUKA.forEach(a=>cards.push({q:selDir==='ru-cz'?a.ru:a.lat, a:selDir==='ru-cz'?a.lat:a.ru, ph:'', cat:'azbuka'}));
  }
  if(mode==='slovicka'||mode==='oboji'){
    SLOVICKA.filter(s=>selCats.includes(s.cat)).forEach(s=>cards.push({q:selDir==='ru-cz'?s.ru:s.cz, a:selDir==='ru-cz'?s.cz:s.ru, ph:s.ph, cat:s.cat}));
  }
  for(let i=cards.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [cards[i],cards[j]]=[cards[j],cards[i]]; }
  return cards.slice(0,Math.min(selCount,cards.length));
}

function startGame(){
  deck=isRepeat?wrongCards.map(c=>({...c})):buildDeck();
  idx=0; correct=0; wrongCards=[]; answered=false;
  showScreen('game'); showCard();
}

function showCard(){
  const card=deck[idx];
  const pct=(idx/deck.length)*100;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=`${idx+1}/${deck.length}`;
  document.getElementById('card-category').textContent=card.cat;
  document.getElementById('card-question').textContent=card.q;
  document.getElementById('card-phonetic').textContent=card.ph?`[${card.ph}]`:'';
  document.getElementById('card-direction').textContent=selDir==='ru-cz'?'RUSKY → ČESKY':'ČESKY → RUSKY';
  document.getElementById('answer-text').textContent=card.a;
  const inp=document.getElementById('answer-input');
  inp.value=''; inp.className='answer-input'; inp.disabled=false; inp.focus();
  document.getElementById('card-answer').classList.remove('visible');
  document.getElementById('feedback').className='feedback-row';
  document.getElementById('next-btn').classList.remove('visible');
  document.querySelector('.submit-btn').style.display='flex';
  answered=false;
}

function checkAnswer(){
  if(answered){ nextCard(); return; }
  const card=deck[idx];
  const inp=document.getElementById('answer-input');
  const user=inp.value.trim().toLowerCase();
  const ans=card.a.toLowerCase();
  answered=true; inp.disabled=true;
  document.getElementById('card-answer').classList.add('visible');
  document.querySelector('.submit-btn').style.display='none';
  document.getElementById('next-btn').classList.add('visible');
  const fb=document.getElementById('feedback');
  const variants=ans.split('/').map(s=>s.trim());
  if(variants.includes(user)){
    inp.classList.add('correct'); fb.className='feedback-row correct'; fb.textContent='✓ Správně!'; correct++;
  } else {
    inp.classList.add('wrong'); fb.className='feedback-row wrong'; fb.textContent=`✗ Správně: ${card.a}`; wrongCards.push(card);
  }
}

function nextCard(){ idx++; if(idx>=deck.length) showResult(); else showCard(); }

function showResult(){
  const total=deck.length, wrong=total-correct, pct=Math.round(correct/total*100);
  saveStats(correct,total);
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('res-correct').textContent=correct;
  document.getElementById('res-wrong').textContent=wrong;
  document.getElementById('res-total').textContent=total;
  let emoji='😔',title='Nevzdávej se!';
  if(pct>=90){emoji='🔥';title='Výborně!';}
  else if(pct>=70){emoji='💪';title='Dobře!';}
  else if(pct>=50){emoji='📚';title='Skoro!';}
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-sub').textContent=`${correct} z ${total} správně`;
  const rb=document.getElementById('repeat-btn');
  if(wrongCards.length>0){ rb.style.display='block'; rb.textContent=`OPAKOVAT CHYBY (${wrongCards.length})`; }
  else rb.style.display='none';
  showScreen('result');
}

function repeatWrong(){ isRepeat=true; startGame(); }

function showStatsScreen(){
  const s=loadStats();
  document.getElementById('s-games').textContent=s.games;
  document.getElementById('s-best').textContent=s.best+'%';
  document.getElementById('s-total-q').textContent=s.totalQ;
  const avg=s.totalQ>0?Math.round(s.totalC/s.totalQ*100):0;
  document.getElementById('s-avg').textContent=avg+'%';
}

document.getElementById('answer-input').addEventListener('keydown',e=>{ if(e.key==='Enter') checkAnswer(); });
updateMenuStats();
</script>
</body>
</html>
